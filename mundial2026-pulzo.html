<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundial 2026 — Pulzo</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;font-family:'Nunito Sans',sans-serif;background:transparent;}
:root{
  --p:#8f00ff;--pd:#7a00e6;--sec:#3c00a3;
  --bg1:#ffffff;--bg2:#f9f7ff;--bg3:#f3f0ff;
  --bdr1:#e8e2ff;--bdr2:#d4c9ff;
  --t1:#1a1625;--t2:#524e6e;--t3:#7a7289;
}

/* BARRA */
.wm-bar{border:1.5px solid var(--bdr2);border-radius:12px;overflow:hidden;box-shadow:0 2px 16px rgba(143,0,255,0.10);background:var(--bg1);}

/* FILA 1 */
.row1{background:var(--bg2);display:flex;align-items:center;padding:11px 16px;gap:10px;border-bottom:1.5px solid var(--bdr1);}
.r1-brand{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.r1-trophy{font-size:18px;line-height:1;}
.r1-title{font-size:15px;font-weight:700;color:var(--t1);}
.r1-sep{width:1.5px;height:18px;background:var(--bdr2);flex-shrink:0;margin:0 2px;}
.r1-live{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.r1-live-dot{width:8px;height:8px;background:#22c55e;border-radius:50%;animation:blink 1.2s infinite;box-shadow:0 0 6px rgba(34,197,94,0.5);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.r1-live-label{font-size:12px;font-weight:700;color:var(--t2);white-space:nowrap;}
.r1-scores{display:flex;align-items:center;flex:1;overflow:hidden;gap:0;}
.r1-score{font-size:13px;font-weight:700;color:var(--t1);white-space:nowrap;}
.r1-score.prox{color:var(--t3);font-weight:600;}
.r1-pipe{font-size:14px;color:var(--bdr2);margin:0 12px;flex-shrink:0;}
.r1-toggle{display:flex;align-items:center;gap:4px;font-size:13px;font-weight:700;color:var(--p);cursor:pointer;white-space:nowrap;flex-shrink:0;user-select:none;}
.r1-toggle i{font-size:14px;transition:transform .2s;}

/* FILA 2: botones */
.row2{background:var(--bg1);padding:10px 12px;display:flex;gap:8px;}
.r2-btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:9px 0;flex:1;border:1.5px solid var(--bdr2);border-radius:10px;background:var(--bg1);color:var(--t2);font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s;font-family:'Nunito Sans',sans-serif;}
.r2-btn i{font-size:15px;color:var(--p);}
.r2-btn:hover{background:var(--bg3);color:var(--p);border-color:var(--p);}
.r2-btn.active{background:var(--p);color:#fff;border-color:var(--p);}
.r2-btn.active i{color:#fff;}

/* PANELES */
.panel{padding:16px;background:var(--bg1);border-top:1.5px solid var(--bdr1);display:none;animation:fadeIn .2s ease;}
.panel.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}

/* LOADING / ERROR */
.cargando{text-align:center;padding:24px;color:var(--t3);font-size:13px;}
.cargando i{font-size:24px;color:var(--p);display:block;margin:0 auto 8px;animation:spin 1s linear infinite;}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.error-msg{text-align:center;padding:16px;color:var(--t3);font-size:13px;background:var(--bg2);border-radius:8px;}
.error-msg i{font-size:24px;color:var(--p);opacity:.4;display:block;margin:0 auto 8px;}

/* NOTICIAS */
.n-item{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--bdr1);cursor:pointer;text-decoration:none;}
.n-item:last-child{border-bottom:none;}
.n-item:hover .n-title{color:var(--p);}
.n-img{width:80px;height:58px;border-radius:8px;background:var(--bg3);flex-shrink:0;overflow:hidden;border:1px solid var(--bdr1);}
.n-img img{width:100%;height:100%;object-fit:cover;}
.n-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.n-placeholder i{font-size:22px;color:var(--p);opacity:.35;}
.n-cat{font-size:10px;font-weight:700;color:var(--p);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px;}
.n-title{font-size:13px;color:var(--t1);line-height:1.4;font-weight:600;margin-bottom:4px;transition:color .15s;}
.n-time{font-size:11px;color:var(--t3);}

/* PARTIDOS */
.day-label{font-size:10px;font-weight:700;color:var(--p);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.day-label::after{content:'';flex:1;height:1px;background:var(--bdr1);}
.mc{border:1.5px solid var(--bdr1);border-radius:10px;padding:11px 14px;margin-bottom:8px;background:var(--bg2);}
.mc:last-child{margin-bottom:0;}
.mc.en-vivo{border-color:var(--p);background:#faf6ff;}
.badge-vivo{display:inline-flex;align-items:center;gap:5px;background:var(--p);color:#fff;font-size:10px;font-weight:700;text-transform:uppercase;padding:2px 8px;border-radius:5px;margin-bottom:7px;}
.badge-vivo span{width:6px;height:6px;background:#4ade80;border-radius:50%;animation:blink 1.2s infinite;}
.mt{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:14px;font-weight:700;color:var(--t1);}
.mvs{font-size:11px;color:var(--t3);font-weight:400;background:#fff;border:1px solid var(--bdr2);padding:1px 7px;border-radius:4px;}
.marcador{font-size:20px;font-weight:700;color:var(--p);background:var(--bg3);padding:2px 12px;border-radius:6px;margin:0 4px;}
.minuto{font-size:12px;color:var(--t3);}
.mm{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.mtime{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--sec);}
.mtime i{font-size:13px;}
.ch{background:#fff;border:1.5px solid var(--bdr2);border-radius:6px;padding:3px 9px;font-size:11px;color:var(--t2);font-weight:600;}
.p-nota{font-size:11px;color:var(--t3);margin-top:12px;text-align:center;}

/* POSICIONES */
.gg{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;}
.gc{border:1.5px solid var(--bdr1);border-radius:10px;overflow:hidden;}
.gh{padding:8px 12px;background:var(--bg3);font-size:11px;font-weight:700;color:var(--sec);text-transform:uppercase;letter-spacing:.5px;display:flex;justify-content:space-between;border-bottom:1px solid var(--bdr1);}
.gr{display:flex;align-items:center;padding:7px 12px;border-bottom:1px solid var(--bdr1);font-size:12px;gap:7px;}
.gr:last-child{border-bottom:none;}
.pn{width:15px;font-size:11px;color:var(--t3);flex-shrink:0;text-align:center;}
.p1{color:var(--p);font-weight:700;}.p2{color:var(--sec);font-weight:700;}
.tn{flex:1;color:var(--t1);font-weight:600;}
.st{width:22px;text-align:center;color:var(--t3);font-size:11px;}
.st.pts{font-weight:700;color:var(--t1);}
.cbadge{font-size:9px;font-weight:700;background:var(--bg3);color:var(--p);border:1px solid var(--bdr1);border-radius:4px;padding:1px 5px;}
.pos-nota{font-size:11px;color:var(--t3);margin-top:10px;display:flex;align-items:center;gap:6px;}

/* PREDICCIONES */
.stitle{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.stitle::after{content:'';flex:1;height:1px;background:var(--bdr1);}
.pc{border:1.5px solid var(--bdr1);border-radius:10px;padding:14px;margin-bottom:10px;background:var(--bg2);}
.pm{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.pteam{flex:1;text-align:center;font-size:14px;font-weight:700;color:var(--t1);}
.pvs{font-size:11px;color:var(--t3);background:#fff;padding:3px 9px;border-radius:6px;border:1.5px solid var(--bdr2);font-weight:600;}
.winner-tag{display:inline-flex;align-items:center;gap:6px;background:var(--bg3);border:1.5px solid var(--bdr2);border-radius:8px;padding:5px 12px;font-size:12px;font-weight:700;color:var(--p);margin-bottom:11px;width:100%;}
.pb{display:flex;flex-direction:column;gap:7px;}
.pr{display:flex;align-items:center;gap:8px;font-size:12px;}
.prl{width:80px;color:var(--t2);font-weight:600;}
.pt2{flex:1;height:6px;background:var(--bdr1);border-radius:3px;overflow:hidden;}
.pf{height:100%;border-radius:3px;background:var(--p);transition:width .6s ease;}
.pf.draw{background:#b0a8c8;}.pf.away{background:var(--sec);}
.pp{width:30px;text-align:right;font-weight:700;color:var(--t1);}
.cg{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;}
.cc{padding:11px 12px;border:1.5px solid var(--bdr1);border-radius:10px;background:var(--bg2);}
.ct{font-size:13px;font-weight:700;color:var(--t1);margin-bottom:6px;}
.cb{height:5px;border-radius:3px;background:var(--bdr1);margin-bottom:5px;overflow:hidden;}
.cf{height:100%;border-radius:3px;background:var(--p);}
.cn{font-size:11px;color:var(--t2);font-weight:600;}
.pred-nota{font-size:11px;color:var(--t3);margin-top:12px;text-align:center;}

/* RESPONSIVE */
@media(max-width:600px){
  .r1-scores{display:none;}
  .r2-btn{font-size:11px;padding:8px 0;gap:4px;}
  .gg{grid-template-columns:1fr;}
  .cg{grid-template-columns:1fr 1fr;}
}
@media(max-width:400px){
  .r2-btn span{display:none;}
}
</style>
</head>
<body>

<div class="wm-bar">

  <!-- FILA 1 -->
  <div class="row1">
    <div class="r1-brand">
      <span class="r1-trophy">🏆</span>
      <span class="r1-title">Mundial 2026</span>
    </div>
    <div class="r1-sep"></div>
    <div class="r1-live" id="r1-live">
      <span class="r1-live-dot"></span>
      <span class="r1-live-label">En vivo:</span>
    </div>
    <div class="r1-scores">
      <span class="r1-score" id="score1">Cargando...</span>
      <span class="r1-pipe" id="score-pipe" style="display:none"></span>
      <span class="r1-score prox" id="score2"></span>
    </div>
    <span class="r1-toggle" id="r1-toggle" onclick="toggleBar()">
      Cerrar <i class="ti ti-chevron-up"></i>
    </span>
  </div>

  <!-- EXPANDABLE: botones + paneles -->
  <div id="expandable">

    <div class="row2">
      <button class="r2-btn" id="btn-noticias" onclick="showPanel('noticias')">
        <i class="ti ti-news"></i><span> Noticias</span>
      </button>
      <button class="r2-btn" id="btn-partidos" onclick="showPanel('partidos')">
        <i class="ti ti-device-tv"></i><span> Partidos en TV</span>
      </button>
      <button class="r2-btn" id="btn-posiciones" onclick="showPanel('posiciones')">
        <i class="ti ti-list-numbers"></i><span> Posiciones</span>
      </button>
      <button class="r2-btn" id="btn-predicciones" onclick="showPanel('predicciones')">
        <i class="ti ti-chart-bar"></i><span> Predicciones</span>
      </button>
    </div>

    <!-- PANEL NOTICIAS -->
    <div id="panel-noticias" class="panel">
      <div class="cargando" id="n-loading">
        <i class="ti ti-loader"></i>Cargando noticias de fútbol...
      </div>
      <div id="n-lista"></div>
    </div>

    <!-- PANEL PARTIDOS -->
    <div id="panel-partidos" class="panel">
      <div class="cargando" id="p-loading">
        <i class="ti ti-loader"></i>Cargando partidos del día...
      </div>
      <div id="p-lista"></div>
    </div>

    <!-- PANEL POSICIONES -->
    <div id="panel-posiciones" class="panel">
      <div class="cargando" id="pos-loading">
        <i class="ti ti-loader"></i>Cargando posiciones...
      </div>
      <div id="pos-lista"></div>
    </div>

    <!-- PANEL PREDICCIONES -->
    <div id="panel-predicciones" class="panel">
      <div class="cargando" id="pred-loading">
        <i class="ti ti-loader"></i>Cargando predicciones del día...
      </div>
      <div id="pred-lista"></div>
    </div>

  </div>
</div>

<script>
// ── CONFIGURACIÓN ──────────────────────────────────────────────
var API_KEY   = '1b272b5c66000030df14ab628948019c';
var API_BASE  = 'https://v3.football.api-sports.io';
var LEAGUE_ID = 1;      // Mundial FIFA 2026
var SEASON    = 2026;
var RSS_URL   = 'https://filesstaticpulzo.s3.us-west-2.amazonaws.com/pulzo-lite/atlas/rss/rss-pulzo-futbol.xml';
var RSS_PROXIES = [
  'https://api.allorigins.win/get?url=',
  'https://corsproxy.io/?',
  'https://api.codetabs.com/v1/proxy?quest='
];

// Horario En Vivo: 7am - 10pm hora Colombia
var HORA_INICIO = 7;
var HORA_FIN    = 22;

// Canales por país para Colombia (se actualiza manualmente si cambia)
var CANALES = {
  'Colombia': ['Caracol TV', 'RCN', 'Win Sports'],
  'default':  ['Dsports', 'Win Sports']
};

// ── ESTADO ─────────────────────────────────────────────────────
var barOpen       = true;
var activePanel   = null;
var partidosCacheados = null;
var posicionesCache   = null;
var predCache         = null;

// ── HELPERS ────────────────────────────────────────────────────
function tiempoRelativo(fecha) {
  var diff = Math.floor((Date.now() - new Date(fecha)) / 60000);
  if (diff < 1)  return 'Ahora mismo';
  if (diff < 60) return 'Hace ' + diff + ' min';
  var h = Math.floor(diff / 60);
  if (h < 24)    return 'Hace ' + h + ' hora' + (h > 1 ? 's' : '');
  var d = Math.floor(h / 24);
  return 'Hace ' + d + ' día' + (d > 1 ? 's' : '');
}

function fechaFormato(dateStr) {
  var dias  = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  var meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  var d = new Date(dateStr);
  return dias[d.getDay()] + ' ' + d.getDate() + ' ' + meses[d.getMonth()];
}

function horaLocal(timestamp) {
  // Convierte timestamp UTC a hora Colombia (UTC-5)
  var d = new Date(timestamp * 1000);
  var h = d.getUTCHours() - 5;
  if (h < 0) h += 24;
  var m = d.getUTCMinutes();
  var ampm = h >= 12 ? 'p.m.' : 'a.m.';
  var h12 = h % 12 || 12;
  return h12 + ':' + (m < 10 ? '0' + m : m) + ' ' + ampm;
}

function canalesPartido(equipos) {
  // Devuelve canales según si juega Colombia
  if (equipos && (equipos.indexOf('Colombia') !== -1)) {
    return CANALES['Colombia'];
  }
  return CANALES['default'];
}

function apiCall(endpoint, params) {
  var url = API_BASE + endpoint + '?';
  var p = Object.assign({ league: LEAGUE_ID, season: SEASON }, params);
  url += Object.keys(p).map(function(k){ return k + '=' + p[k]; }).join('&');
  return fetch(url, {
    headers: { 'x-apisports-key': API_KEY }
  }).then(function(r){ return r.json(); });
}

// ── BARRA: ABRIR / CERRAR ──────────────────────────────────────
function toggleBar() {
  var exp = document.getElementById('expandable');
  var tog = document.getElementById('r1-toggle');
  if (barOpen) {
    exp.style.display = 'none';
    tog.innerHTML = 'Ver todo <i class="ti ti-chevron-down"></i>';
    barOpen = false;
  } else {
    exp.style.display = '';
    tog.innerHTML = 'Cerrar <i class="ti ti-chevron-up"></i>';
    barOpen = true;
  }
}

// ── PANELES ────────────────────────────────────────────────────
function showPanel(name) {
  var panels = ['noticias','partidos','posiciones','predicciones'];
  if (activePanel === name) {
    document.getElementById('panel-'+name).classList.remove('active');
    document.getElementById('btn-'+name).classList.remove('active');
    activePanel = null;
    return;
  }
  panels.forEach(function(p) {
    document.getElementById('panel-'+p).classList.remove('active');
    document.getElementById('btn-'+p).classList.remove('active');
  });
  document.getElementById('panel-'+name).classList.add('active');
  document.getElementById('btn-'+name).classList.add('active');
  activePanel = name;

  // Cargar datos solo la primera vez
  if (name === 'noticias')     cargarNoticias();
  if (name === 'partidos')     cargarPartidos();
  if (name === 'posiciones')   cargarPosiciones();
  if (name === 'predicciones') cargarPredicciones();
}

// ── NOTICIAS: RSS ──────────────────────────────────────────────
var noticiasCache = false;
function cargarNoticias() {
  if (noticiasCache) return;
  var loading = document.getElementById('n-loading');
  var lista   = document.getElementById('n-lista');
  loading.style.display = 'block';

  var proxies = [
    'https://api.allorigins.win/get?url=',
    'https://corsproxy.io/?',
    'https://api.codetabs.com/v1/proxy?quest='
  ];

  function intentar(i) {
    if (i >= proxies.length) {
      loading.style.display = 'none';
      lista.innerHTML = '<div class="error-msg"><i class="ti ti-wifi-off"></i>No se pudieron cargar las noticias. Intenta más tarde.</div>';
      return;
    }
    fetch(proxies[i] + encodeURIComponent(RSS_URL))
      .then(function(r){ return r.json(); })
      .then(function(data) {
        var xmlText = typeof data === 'string' ? data : (data.contents || '');
        if (!xmlText) throw new Error('vacio');
        var parser = new DOMParser();
        var xml = parser.parseFromString(xmlText, 'text/xml');
        var items = Array.from(xml.querySelectorAll('item')).slice(0, 5);
        if (!items.length) throw new Error('sin items');
        loading.style.display = 'none';
        noticiasCache = true;
        procesarItems(items, lista);
      })
      .catch(function(){ intentar(i + 1); });
  }
  intentar(0);
}

function procesarItems(items, lista) {
      items.forEach(function(item) {
        var titulo = (item.querySelector('title') || {}).textContent || '';
        var enlace = (item.querySelector('link')  || {}).textContent || '#';
        var fecha  = (item.querySelector('pubDate')|| {}).textContent || '';
        var desc   = (item.querySelector('description')||{}).textContent || '';
        var imgUrl = '';

        var enc = item.querySelector('enclosure');
        if (enc) imgUrl = enc.getAttribute('url') || '';
        if (!imgUrl) {
          var m = desc.match(/<img[^>]+src=["']([^"']+)["']/i);
          if (m) imgUrl = m[1];
        }

        var imgHtml = imgUrl
          ? '<img src="'+imgUrl+'" alt="'+titulo+'" loading="lazy" onerror="this.parentElement.innerHTML=\'<div class=n-placeholder><i class=\\\"ti ti-photo\\\"></i></div>\'">'
          : '<div class="n-placeholder"><i class="ti ti-photo"></i></div>';

        var el = document.createElement('a');
        el.className = 'n-item';
        el.href = enlace;
        el.target = '_blank';
        el.rel = 'noopener';
        el.innerHTML =
          '<div class="n-img">'+ imgHtml +'</div>'+
          '<div style="flex:1;min-width:0">'+
            '<div class="n-cat">Fútbol</div>'+
            '<div class="n-title">'+ titulo +'</div>'+
            '<div class="n-time">'+ tiempoRelativo(fecha) +'</div>'+
          '</div>';
        lista.appendChild(el);
      });
}

// ── PARTIDOS: API (1 vez al día) ───────────────────────────────
function cargarPartidos() {
  if (partidosCacheados) { renderPartidos(partidosCacheados); return; }
  var loading = document.getElementById('p-loading');
  var lista   = document.getElementById('p-lista');
  loading.style.display = 'block';
  lista.innerHTML = '';

  apiCall('/fixtures', { next: 9 })
    .then(function(data) {
      loading.style.display = 'none';
      if (!data.response || !data.response.length) {
        lista.innerHTML = '<div class="error-msg"><i class="ti ti-calendar-off"></i>No hay partidos programados próximamente.</div>';
        return;
      }
      partidosCacheados = data.response;
      renderPartidos(data.response);
    })
    .catch(function() {
      loading.style.display = 'none';
      lista.innerHTML = '<div class="error-msg"><i class="ti ti-wifi-off"></i>No se pudieron cargar los partidos.</div>';
    });
}

function renderPartidos(fixtures) {
  var lista = document.getElementById('p-lista');
  lista.innerHTML = '';

  // Agrupar por día
  var dias = {};
  fixtures.forEach(function(f) {
    var fecha = f.fixture.date.split('T')[0];
    if (!dias[fecha]) dias[fecha] = [];
    dias[fecha].push(f);
  });

  Object.keys(dias).sort().forEach(function(fecha) {
    var labelEl = document.createElement('div');
    labelEl.className = 'day-label';
    labelEl.textContent = fechaFormato(fecha);
    lista.appendChild(labelEl);

    dias[fecha].forEach(function(f) {
      var status    = f.fixture.status.short;
      var enVivo    = ['1H','2H','ET','HT','P'].indexOf(status) !== -1;
      var terminado = status === 'FT';
      var local     = f.teams.home.name;
      var visita    = f.teams.away.name;
      var golesL    = f.goals.home;
      var golesV    = f.goals.away;
      var minuto    = f.fixture.status.elapsed;
      var equipos   = local + ' ' + visita;
      var canales   = canalesPartido(equipos);

      var mc = document.createElement('div');
      mc.className = 'mc' + (enVivo ? ' en-vivo' : '');

      var html = '';
      if (enVivo) {
        html += '<div class="badge-vivo"><span></span> En vivo · '+ minuto +'\'</div>';
      }
      html += '<div class="mt">'+ local +' <span class="mvs">vs</span> '+ visita +'</div>';

      if (enVivo || terminado) {
        html += '<div class="mm"><span class="marcador">'+ golesL +' – '+ golesV +'</span>';
        if (terminado) html += '<span class="minuto">Final</span>';
        html += '</div>';
      } else {
        html += '<div class="mm">';
        html += '<span class="mtime"><i class="ti ti-clock"></i> '+ horaLocal(f.fixture.timestamp) +'</span>';
        canales.forEach(function(c){ html += '<span class="ch">'+ c +'</span>'; });
        html += '</div>';
      }

      mc.innerHTML = html;
      lista.appendChild(mc);
    });
  });

  lista.innerHTML += '<p class="p-nota">* Horarios en hora Colombia (COT). Canales referenciales.</p>';
}

// ── POSICIONES: API (al terminar cada partido) ─────────────────
function cargarPosiciones() {
  if (posicionesCache) { renderPosiciones(posicionesCache); return; }
  var loading = document.getElementById('pos-loading');
  var lista   = document.getElementById('pos-lista');
  loading.style.display = 'block';
  lista.innerHTML = '';

  apiCall('/standings', {})
    .then(function(data) {
      loading.style.display = 'none';
      if (!data.response || !data.response.length) {
        lista.innerHTML = '<div class="error-msg"><i class="ti ti-table-off"></i>Las posiciones estarán disponibles cuando inicie el torneo.</div>';
        return;
      }
      posicionesCache = data.response[0].league.standings;
      renderPosiciones(posicionesCache);
    })
    .catch(function() {
      loading.style.display = 'none';
      lista.innerHTML = '<div class="error-msg"><i class="ti ti-wifi-off"></i>No se pudieron cargar las posiciones.</div>';
    });
}

function renderPosiciones(standings) {
  var lista = document.getElementById('pos-lista');
  lista.innerHTML = '';
  var grid = document.createElement('div');
  grid.className = 'gg';

  standings.forEach(function(grupo) {
    var gc = document.createElement('div');
    gc.className = 'gc';
    var nombre = grupo[0] ? grupo[0].group : 'Grupo';
    gc.innerHTML = '<div class="gh">'+ nombre +' <span>PJ G E P Pts</span></div>';

    grupo.forEach(function(equipo) {
      var pos = equipo.rank;
      var clasif = pos <= 2 ? '<span class="cbadge">Clasifica</span>' : '';
      var pnClass = pos === 1 ? 'pn p1' : pos === 2 ? 'pn p2' : 'pn';
      gc.innerHTML +=
        '<div class="gr">'+
          '<span class="'+ pnClass +'">'+ pos +'</span>'+
          '<span style="font-size:15px">'+ (equipo.team.logo ? '<img src="'+equipo.team.logo+'" style="width:18px;height:18px;object-fit:contain" alt="">' : '') +'</span>'+
          '<span class="tn">'+ equipo.team.name +'</span>'+
          clasif +
          '<span class="st">'+ equipo.all.played +'</span>'+
          '<span class="st">'+ equipo.all.win +'</span>'+
          '<span class="st">'+ equipo.all.draw +'</span>'+
          '<span class="st">'+ equipo.all.lose +'</span>'+
          '<span class="st pts">'+ equipo.points +'</span>'+
        '</div>';
    });
    grid.appendChild(gc);
  });

  lista.appendChild(grid);
  lista.innerHTML += '<p class="pos-nota"><i class="ti ti-info-circle" style="font-size:13px;color:var(--p)"></i> Los dos primeros de cada grupo clasifican. Se actualiza al terminar cada partido.</p>';
}

// ── PREDICCIONES: API (2 veces al día) ────────────────────────
function cargarPredicciones() {
  if (predCache) { renderPredicciones(predCache); return; }
  var loading = document.getElementById('pred-loading');
  var lista   = document.getElementById('pred-lista');
  loading.style.display = 'block';
  lista.innerHTML = '';

  // Trae los próximos 3 partidos del día para las predicciones
  apiCall('/fixtures', { next: 3 })
    .then(function(data) {
      if (!data.response || !data.response.length) {
        loading.style.display = 'none';
        lista.innerHTML = '<div class="error-msg"><i class="ti ti-chart-off"></i>No hay predicciones disponibles en este momento.</div>';
        return;
      }
      // Por cada partido pide la predicción
      var fixtures = data.response.slice(0, 3);
      var promesas = fixtures.map(function(f) {
        return apiCall('/predictions', { fixture: f.fixture.id })
          .then(function(pred) {
            return { fixture: f, pred: pred.response[0] };
          });
      });
      return Promise.all(promesas);
    })
    .then(function(resultados) {
      loading.style.display = 'none';
      if (!resultados || !resultados.length) return;
      predCache = resultados;
      renderPredicciones(resultados);
    })
    .catch(function() {
      loading.style.display = 'none';
      lista.innerHTML = '<div class="error-msg"><i class="ti ti-wifi-off"></i>No se pudieron cargar las predicciones.</div>';
    });
}

function renderPredicciones(resultados) {
  var lista = document.getElementById('pred-lista');
  lista.innerHTML = '';

  // Título sección partidos del día
  var t1 = document.createElement('div');
  t1.className = 'stitle';
  t1.textContent = '¿Quién gana hoy?';
  lista.appendChild(t1);

  resultados.forEach(function(r) {
    if (!r || !r.pred) return;
    var local  = r.fixture.teams.home.name;
    var visita = r.fixture.teams.away.name;
    var pred   = r.pred;
    var winner = pred.predictions ? pred.predictions.winner : null;
    var pct    = pred.predictions ? pred.predictions.percent : null;

    var winnerNombre = winner ? winner.name : local;
    var pLocal  = pct ? parseInt(pct.home)  : 50;
    var pEmpate = pct ? parseInt(pct.draw)  : 25;
    var pVisita = pct ? parseInt(pct.away)  : 25;

    var pc = document.createElement('div');
    pc.className = 'pc';
    pc.innerHTML =
      '<div class="pm">'+
        '<div class="pteam">'+ local +'</div>'+
        '<div class="pvs">vs</div>'+
        '<div class="pteam">'+ visita +'</div>'+
      '</div>'+
      '<div class="winner-tag"><i class="ti ti-trophy" style="font-size:14px"></i> Favorito: '+ winnerNombre +' gana</div>'+
      '<div class="pb">'+
        '<div class="pr"><span class="prl">'+ local +'</span><div class="pt2"><div class="pf" style="width:'+ pLocal +'%"></div></div><span class="pp">'+ pLocal +'%</span></div>'+
        '<div class="pr"><span class="prl">Empate</span><div class="pt2"><div class="pf draw" style="width:'+ pEmpate +'%"></div></div><span class="pp">'+ pEmpate +'%</span></div>'+
        '<div class="pr"><span class="prl">'+ visita +'</span><div class="pt2"><div class="pf away" style="width:'+ pVisita +'%"></div></div><span class="pp">'+ pVisita +'%</span></div>'+
      '</div>';
    lista.appendChild(pc);
  });

  lista.innerHTML += '<p class="pred-nota">* Predicciones basadas en modelos estadísticos de API-Football. Se actualizan al inicio y al final de cada jornada.</p>';
}

// ── EN VIVO: ticker fila 1 ─────────────────────────────────────
function actualizarEnVivo() {
  var ahora = new Date();
  var hora  = ahora.getHours();
  var liveEl  = document.getElementById('r1-live');
  var score1  = document.getElementById('score1');
  var score2  = document.getElementById('score2');
  var pipeEl  = document.getElementById('score-pipe');

  if (hora < HORA_INICIO || hora >= HORA_FIN) {
    liveEl.style.display = 'none';
    score1.textContent = 'Consulta los partidos del día';
    score2.textContent = '';
    pipeEl.style.display = 'none';
    return;
  }

  liveEl.style.display = 'flex';

  apiCall('/fixtures', { live: 'all' })
    .then(function(data) {
      var vivos = data.response || [];
      if (!vivos.length) {
        // No hay partido en vivo — muestra el próximo
        return apiCall('/fixtures', { next: 1 }).then(function(d) {
          var prox = d.response && d.response[0];
          if (prox) {
            score1.textContent = 'Próximo: ' + prox.teams.home.name + ' vs ' + prox.teams.away.name + ' · ' + horaLocal(prox.fixture.timestamp);
            score2.textContent = '';
            pipeEl.style.display = 'none';
          } else {
            score1.textContent = 'No hay partidos en este momento';
            pipeEl.style.display = 'none';
          }
        });
      }

      // Hay partidos en vivo
      var f1 = vivos[0];
      score1.textContent = f1.teams.home.name + ' ' + f1.goals.home + '–' + f1.goals.away + ' ' + f1.teams.away.name;

      // Segundo partido: en vivo si hay o próximo del día
      if (vivos[1]) {
        var f2 = vivos[1];
        score2.textContent = f2.teams.home.name + ' ' + f2.goals.home + '–' + f2.goals.away + ' ' + f2.teams.away.name;
        pipeEl.style.display = '';
        pipeEl.textContent = '|';
      } else {
        return apiCall('/fixtures', { next: 1 }).then(function(d) {
          var prox = d.response && d.response[0];
          if (prox) {
            score2.textContent = 'Próx: ' + prox.teams.home.name + ' vs ' + prox.teams.away.name + ' · ' + horaLocal(prox.fixture.timestamp);
            pipeEl.style.display = '';
            pipeEl.textContent = '|';
          }
        });
      }
    })
    .catch(function() {
      score1.textContent = 'En vivo no disponible';
      pipeEl.style.display = 'none';
    });
}

// ── INIT ───────────────────────────────────────────────────────
actualizarEnVivo();

// Actualiza En Vivo cada 60 segundos solo si hay partido activo
setInterval(function() {
  var hora = new Date().getHours();
  if (hora >= HORA_INICIO && hora < HORA_FIN) {
    actualizarEnVivo();
  }
}, 60 * 1000);

</script>
