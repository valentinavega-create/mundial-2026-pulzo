<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;font-family:'Nunito Sans',sans-serif;background:transparent;}
:root{
  --p:#8f00ff;--sec:#3c00a3;
  --bg1:#ffffff;--bg2:#f9f7ff;--bg3:#f3f0ff;
  --bdr1:#e8e2ff;--bdr2:#d4c9ff;
  --t1:#1a1625;--t2:#524e6e;--t3:#7a7289;
}

.wm-bar{border:3px solid var(--p);border-radius:12px;overflow:hidden;box-shadow:0 4px 20px rgba(143,0,255,0.18);background:var(--bg1);}

/* FILA 1 */
.row1{background:var(--bg2);display:flex;align-items:center;padding:11px 16px;gap:8px;border-bottom:1.5px solid var(--bdr1);overflow:hidden;}
.r1-brand{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.r1-trophy{font-size:18px;line-height:1;}
.r1-title{font-size:15px;font-weight:700;color:var(--t1);white-space:nowrap;}
.r1-sep{width:1.5px;height:18px;background:var(--bdr2);flex-shrink:0;margin:0 2px;}

/* EN VIVO badge */
.r1-live{display:none;align-items:center;gap:6px;flex-shrink:0;}
.r1-live.visible{display:flex;}
.r1-live-dot{width:8px;height:8px;background:#22c55e;border-radius:50%;animation:blink 1.2s infinite;box-shadow:0 0 6px rgba(34,197,94,0.5);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.r1-live-label{font-size:12px;font-weight:700;color:var(--t2);white-space:nowrap;}

/* TICKER — siempre animado */
.r1-ticker-wrap{flex:1;overflow:hidden;min-width:0;}
.r1-ticker-inner{display:inline-flex;align-items:center;white-space:nowrap;animation:ticker-move 20s linear infinite;}
@keyframes ticker-move{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.r1-score{font-size:13px;font-weight:700;color:var(--t1);padding-right:40px;}
.r1-score.prox{color:var(--t3);font-weight:600;}

/* FILA 2: botones */
.row2{background:var(--bg1);padding:10px 12px;display:flex;gap:8px;}
.r2-btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:9px 0;flex:1;border:1.5px solid var(--bdr2);border-radius:10px;background:var(--bg1);color:var(--t2);font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s;font-family:'Nunito Sans',sans-serif;}
.r2-btn i{font-size:15px;color:var(--p);}
.r2-btn:hover{background:var(--bg3);color:var(--p);border-color:var(--p);}
.r2-btn.active{background:var(--p);color:#fff;border-color:var(--p);}
.r2-btn.active i{color:#fff;}

/* PANELES */
.panel{padding:16px;background:var(--bg1);border-top:1.5px solid var(--bdr1);display:none;animation:fadeIn .2s ease;}
.panel.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}

/* LOADING / ERROR */
.cargando{text-align:center;padding:24px;color:var(--t3);font-size:13px;}
.cargando i{font-size:24px;color:var(--p);display:block;margin:0 auto 8px;animation:spin 1s linear infinite;}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.error-msg{text-align:center;padding:16px;color:var(--t3);font-size:13px;background:var(--bg2);border-radius:8px;}
.error-msg i{font-size:24px;color:var(--p);opacity:.4;display:block;margin:0 auto 8px;}

/* NOTICIAS */
.n-item{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--bdr1);cursor:pointer;text-decoration:none;}
.n-item:last-child{border-bottom:none;}
.n-item:hover .n-title{color:var(--p);}
.n-img{width:80px;height:58px;border-radius:8px;background:var(--bg3);flex-shrink:0;overflow:hidden;border:1px solid var(--bdr1);}
.n-img img{width:100%;height:100%;object-fit:cover;}
.n-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.n-placeholder i{font-size:22px;color:var(--p);opacity:.35;}
.n-cat{font-size:10px;font-weight:700;color:var(--p);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px;}
.n-title{font-size:13px;color:var(--t1);line-height:1.4;font-weight:600;margin-bottom:4px;transition:color .15s;}
.n-time{font-size:11px;color:var(--t3);}

/* PARTIDOS */
.day-label{font-size:10px;font-weight:700;color:var(--p);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.day-label::after{content:'';flex:1;height:1px;background:var(--bdr1);}
.mc{border:1.5px solid var(--bdr1);border-radius:10px;padding:11px 14px;margin-bottom:8px;background:var(--bg2);}
.mc:last-child{margin-bottom:0;}
.mc.en-vivo{border-color:var(--p);background:#faf6ff;}
.badge-vivo{display:inline-flex;align-items:center;gap:5px;background:var(--p);color:#fff;font-size:10px;font-weight:700;text-transform:uppercase;padding:2px 8px;border-radius:5px;margin-bottom:7px;}
.badge-vivo span{width:6px;height:6px;background:#4ade80;border-radius:50%;animation:blink 1.2s infinite;}
.mt{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:14px;font-weight:700;color:var(--t1);}
.mvs{font-size:11px;color:var(--t3);font-weight:400;background:#fff;border:1px solid var(--bdr2);padding:1px 7px;border-radius:4px;}
.marcador{font-size:20px;font-weight:700;color:var(--p);background:var(--bg3);padding:2px 12px;border-radius:6px;margin:0 4px;}
.mm{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.mtime{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--sec);}
.mtime i{font-size:13px;}
.ch{background:#fff;border:1.5px solid var(--bdr2);border-radius:6px;padding:3px 9px;font-size:11px;color:var(--t2);font-weight:600;}

/* POSICIONES */
.gg{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;}
.gc{border:1.5px solid var(--bdr1);border-radius:10px;overflow:hidden;}
.gh{padding:8px 12px;background:var(--bg3);font-size:11px;font-weight:700;color:var(--sec);text-transform:uppercase;letter-spacing:.5px;display:flex;justify-content:space-between;border-bottom:1px solid var(--bdr1);}
.gr{display:flex;align-items:center;padding:7px 12px;border-bottom:1px solid var(--bdr1);font-size:12px;gap:7px;}
.gr:last-child{border-bottom:none;}
.pn{width:15px;font-size:11px;color:var(--t3);flex-shrink:0;text-align:center;}
.p1{color:var(--p);font-weight:700;}.p2{color:var(--sec);font-weight:700;}
.tn{flex:1;color:var(--t1);font-weight:600;}
.st{width:22px;text-align:center;color:var(--t3);font-size:11px;}
.st.pts{font-weight:700;color:var(--t1);}
.cbadge{font-size:9px;font-weight:700;background:var(--bg3);color:var(--p);border:1px solid var(--bdr1);border-radius:4px;padding:1px 5px;}

/* PREDICCIONES */
.stitle{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.stitle::after{content:'';flex:1;height:1px;background:var(--bdr1);}
.pc{border:1.5px solid var(--bdr1);border-radius:10px;padding:14px;margin-bottom:10px;background:var(--bg2);}
.pm{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.pteam{flex:1;text-align:center;font-size:14px;font-weight:700;color:var(--t1);}
.pvs{font-size:11px;color:var(--t3);background:#fff;padding:3px 9px;border-radius:6px;border:1.5px solid var(--bdr2);font-weight:600;}
.winner-tag{display:inline-flex;align-items:center;gap:6px;background:var(--bg3);border:1.5px solid var(--bdr2);border-radius:8px;padding:5px 12px;font-size:12px;font-weight:700;color:var(--p);margin-bottom:11px;width:100%;}
.pb{display:flex;flex-direction:column;gap:7px;}
.pr{display:flex;align-items:center;gap:8px;font-size:12px;}
.prl{width:80px;color:var(--t2);font-weight:600;}
.pt2{flex:1;height:6px;background:var(--bdr1);border-radius:3px;overflow:hidden;}
.pf{height:100%;border-radius:3px;background:var(--p);transition:width .6s ease;}
.pf.draw{background:#b0a8c8;}.pf.away{background:var(--sec);}
.pp{width:30px;text-align:right;font-weight:700;color:var(--t1);}
.pred-nota{font-size:11px;color:var(--t3);margin-top:12px;text-align:center;}

/* RESPONSIVE */
@media(max-width:600px){
  .r2-btn{font-size:11px;padding:8px 0;gap:4px;}
  .r2-btn i{font-size:14px;}
  .gg{grid-template-columns:1fr;}
  .r1-title{font-size:13px;}
  .r1-live-label{display:none;}
}
@media(max-width:400px){
  .r2-btn span{display:none;}
}

// ── HELPERS ────────────────────────────────────────────────────
function tiempoRelativo(fecha) {
  var diff = Math.floor((Date.now() - new Date(fecha)) / 60000);
  if (diff < 1)  return 'Ahora mismo';
  if (diff < 60) return 'Hace ' + diff + ' min';
  var h = Math.floor(diff/60);
  if (h < 24)    return 'Hace ' + h + ' hora' + (h>1?'s':'');
  var d = Math.floor(h/24);
  return 'Hace ' + d + ' día' + (d>1?'s':'');
}

function horaCol(timestamp) {
  // Colombia es UTC-5, siempre fijo sin cambio de horario
  var utcMs = timestamp * 1000;
  var colMs = utcMs - (5 * 3600 * 1000);
  var d = new Date(colMs);
  var h = d.getUTCHours(), m = d.getUTCMinutes();
  var ampm = h >= 12 ? 'p.m.' : 'a.m.';
  var h12 = h % 12 || 12;
  return h12 + ':' + (m < 10 ? '0'+m : m) + ' ' + ampm;
}

function fechaCol(timestamp) {
  var dias  = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  var meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  var d = new Date(timestamp * 1000);
  var offset = -5 * 60 - d.getTimezoneOffset();
  var col = new Date(d.getTime() + offset * 60000);
  var hoy = new Date();
  var offsetHoy = -5 * 60 - hoy.getTimezoneOffset();
  var colHoy = new Date(hoy.getTime() + offsetHoy * 60000);
  var manana = new Date(colHoy); manana.setDate(manana.getDate()+1);
  var esHoy = col.toDateString() === colHoy.toDateString();
  var esManana = col.toDateString() === manana.toDateString();
  var label = dias[col.getDay()] + ' ' + col.getDate() + ' ' + meses[col.getMonth()];
  if (esHoy) return 'Hoy — ' + label;
  if (esManana) return 'Mañana — ' + label;
  return label;
}

function apiCall(endpoint, params) {
  var p = Object.assign({ league: LEAGUE, season: SEASON }, params);
  var qs = Object.keys(p).map(function(k){ return k+'='+p[k]; }).join('&');
  return fetch(API_BASE + endpoint + '?' + qs, {
    headers: { 'x-apisports-key': API_KEY }
  }).then(function(r){ return r.json(); });
}

// ── PANELES ────────────────────────────────────────────────────
function showPanel(name) {
  var panels = ['noticias','partidos','posiciones','predicciones'];
  if (activePanel === name) {
    panels.forEach(function(p){
      document.getElementById('panel-'+p).classList.remove('active');
      document.getElementById('btn-'+p).classList.remove('active');
    });
    activePanel = null;
    return;
  }
  panels.forEach(function(p){
    document.getElementById('panel-'+p).classList.remove('active');
    document.getElementById('btn-'+p).classList.remove('active');
  });
  document.getElementById('panel-'+name).classList.add('active');
  document.getElementById('btn-'+name).classList.add('active');
  activePanel = name;
  if (name === 'noticias')     cargarNoticias();
  if (name === 'partidos')     cargarPartidos();
  if (name === 'posiciones')   cargarPosiciones();
  if (name === 'predicciones') cargarPredicciones();
}

// ── NOTICIAS ───────────────────────────────────────────────────
function cargarNoticias() {
  var loading = document.getElementById('n-loading');
  var lista   = document.getElementById('n-lista');
  // Limpiar lista y mostrar loading cada vez para traer noticias frescas
  lista.innerHTML = '';
  loading.style.display = 'block';
  // Agregar timestamp para evitar caché del navegador
  var url = 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(RSS_URL) + '&t=' + Date.now();
  fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(data) {
      loading.style.display = 'none';
      if (!data.items || !data.items.length) {
        lista.innerHTML = '<div class="error-msg"><i class="ti ti-news-off"></i>No hay noticias disponibles.</div>';
        return;
      }
      data.items.slice(0,6).forEach(function(item) {
        var titulo = item.title || '';
        var enlace = item.link  || '#';
        var fecha  = item.pubDate || '';
        var imgUrl = item.thumbnail || (item.enclosure ? item.enclosure.link : '') || '';
        var el = document.createElement('a');
        el.className = 'n-item';
        el.href = enlace;
        el.target = '_blank';
        el.rel = 'noopener';
        var imgDiv = document.createElement('div');
        imgDiv.className = 'n-img';
        if (imgUrl) {

function canalesPorPartido(timestamp, local, visita) {
  // Obtener fecha en Colombia UTC-5
  var colMs = timestamp * 1000 - (5 * 3600 * 1000);
  var d = new Date(colMs);
  var fecha = d.getUTCFullYear() + '-' +
    String(d.getUTCMonth()+1).padStart(2,'0') + '-' +
    String(d.getUTCDate()).padStart(2,'0');

  var dia = PARRILLA[fecha];
  if (!dia) return ['Dsports'];

  // Buscar el partido por nombre — comparación flexible ignorando mayúsculas y acentos
  function normalizar(s) {
    return s.toLowerCase()
      .replace(/á/g,'a').replace(/é/g,'e').replace(/í/g,'i')
      .replace(/ó/g,'o').replace(/ú/g,'u').replace(/ñ/g,'n')
      .replace(/[\s\.\-\_]/g,'');
  }
  var nLocal  = normalizar(local);
  var nVisita = normalizar(visita);

  for (var i = 0; i < dia.length; i++) {
    var p = dia[i];
    var pL = normalizar(p.local);
    var pV = normalizar(p.visita);
    if ((pL === nLocal && pV === nVisita) ||
        (pL === nVisita && pV === nLocal) ||
        nLocal.indexOf(pL) !== -1 || pL.indexOf(nLocal) !== -1 ||
        nVisita.indexOf(pV) !== -1 || pV.indexOf(nVisita) !== -1) {
      return p.canales;
    }
  }
  return ['Dsports'];
}

function renderPartidos(fixtures) {
  var lista = document.getElementById('p-lista');
  lista.innerHTML = '';
  var dias = {};
  fixtures.forEach(function(f) {
    var d = new Date(f.fixture.timestamp * 1000);
    var offset = -5*60 - d.getTimezoneOffset();
    var col = new Date(d.getTime() + offset*60000);
    var key = col.getFullYear()+'-'+(col.getMonth()+1)+'-'+col.getDate();
    if (!dias[key]) dias[key] = [];
    dias[key].push(f);
  });
  // Mostrar solo los 3 primeros días
  var claves = Object.keys(dias).sort().slice(0, 3);
  claves.forEach(function(key) {
    var f0 = dias[key][0];
    var lbl = document.createElement('div');
    lbl.className = 'day-label';
    lbl.textContent = fechaCol(f0.fixture.timestamp);
    lista.appendChild(lbl);
    dias[key].forEach(function(f) {
      var status = f.fixture.status.short;
      var enVivo = ['1H','2H','ET','HT','P'].indexOf(status) !== -1;
      var terminado = status === 'FT';
      var local  = t(f.teams.home.name);
      var visita = t(f.teams.away.name);
      var canales = canalesPorPartido(f.fixture.timestamp, local, visita);
      var mc = document.createElement('div');
      mc.className = 'mc' + (enVivo ? ' en-vivo' : '');
      var html = '';
      if (enVivo) html += '<div class="badge-vivo"><span></span> En vivo · '+f.fixture.status.elapsed+'\'</div>';
      html += '<div class="mt">'+local+' <span class="mvs">vs</span> '+visita+'</div>';
      if (enVivo || terminado) {
        html += '<div class="mm"><span class="marcador">'+f.goals.home+' – '+f.goals.away+'</span>';
        if (terminado) html += '<span style="font-size:12px;color:var(--t3)">Final</span>';
        html += '</div>';
      } else {
        html += '<div class="mm"><span class="mtime"><i class="ti ti-clock"></i> '+horaCol(f.fixture.timestamp)+'</span>';
        canales.forEach(function(c){ html += '<span class="ch">'+c+'</span>'; });
        html += '</div>';
      }
      mc.innerHTML = html;
      lista.appendChild(mc);
    });
  });
  lista.innerHTML += '<p style="font-size:11px;color:var(--t3);margin-top:12px;text-align:center">* Horarios en hora Colombia. Canales referenciales.</p>';
}

function cargarPredicciones() {
  if (predCache) { renderPredicciones(predCache); return; }
  var loading = document.getElementById('pred-loading');
  var lista   = document.getElementById('pred-lista');
  loading.style.display = 'block';
  apiCall('/fixtures', { next: 3 })
    .then(function(data) {
      if (!data.response || !data.response.length) {
        loading.style.display = 'none';
        lista.innerHTML = '<div class="error-msg"><i class="ti ti-calendar-off"></i>No hay partidos próximos.</div>';
        return;
      }
      var fixtures = data.response.slice(0,3);
      var promesas = fixtures.map(function(f) {
        return apiCall('/predictions', { fixture: f.fixture.id })
          .then(function(p){ return { fixture: f, pred: p.response && p.response[0] ? p.response[0] : null }; })
          .catch(function(){ return { fixture: f, pred: null }; });
      });
      return Promise.all(promesas);
    })
    .then(function(res) {
      loading.style.display = 'none';
      if (!res || !res.length) return;
      predCache = res;
      renderPredicciones(res);
    })
    .catch(function(){
      loading.style.display = 'none';
      lista.innerHTML = '<div class="error-msg"><i class="ti ti-wifi-off"></i>No se pudieron cargar las predicciones.</div>';
    });
}

function renderPredicciones(resultados) {

    var visita = t(r.fixture.teams.away.name);
    var pred   = r.pred;
    var winnerNombre, pLocal, pEmpate, pVisita;
    if (pred && pred.predictions && pred.predictions.percent) {
      var w = pred.predictions.winner;
      var pct = pred.predictions.percent;
      winnerNombre = w ? t(w.name) : null;
      pLocal  = parseInt(pct.home) || 45;
      pEmpate = parseInt(pct.draw) || 25;
      pVisita = parseInt(pct.away) || 30;

      winnerNombre = null; pLocal=45; pEmpate=25; pVisita=30;
    }
    var pc = document.createElement('div');
    pc.className = 'pc';
    var winHtml = winnerNombre
      ? '<div class="winner-tag"><i class="ti ti-trophy" style="font-size:14px"></i> Favorito: '+winnerNombre+' gana</div>'
      : '<div class="winner-tag"><i class="ti ti-minus" style="font-size:14px"></i> Partido muy parejo</div>';
    pc.innerHTML =
      '<div class="pm"><div class="pteam">'+local+'</div><div class="pvs">vs</div><div class="pteam">'+visita+'</div></div>'+
      winHtml+
      '<div class="pb">'+

  nota.className = 'pred-nota';
  nota.textContent = '* Predicciones basadas en modelos estadísticos de API-Football.';
  lista.appendChild(nota);
}

  var liveEl = document.getElementById('r1-live');

  var scoreB = document.getElementById('score-b');

    scoreB.textContent = 'Consulta los partidos del día ';
    return;

  apiCall('/fixtures', { live: 'all' })
    .then(function(data) {
      var vivos = data.response || [];
      if (!vivos.length) {
        // Sin partido en vivo — ocultar badge, mostrar los 2 próximos
        liveEl.classList.remove('visible');
        return apiCall('/fixtures', { next: 2 }).then(function(d) {

                  t(p2.teams.home.name) + ' vs ' + t(p2.teams.away.name) + '  ·  ' + horaCol(p2.fixture.timestamp) + '     ';
          } else if (proximos.length === 1) {
            var p1 = proximos[0];
            txt = 'Próximo: ' + t(p1.teams.home.name) + ' vs ' + t(p1.teams.away.name) + '  ·  ' + horaCol(p1.fixture.timestamp) + '     ';
          } else {
            txt = 'Consulta los partidos del día     ';
          }
          scoreA.textContent = txt;
          scoreB.textContent = txt;
        });
      }
      // Hay partido(s) en vivo — mostrar badge verde
      liveEl.classList.add('visible');
      var txts = vivos.slice(0,2).map(function(f) {
        return t(f.teams.home.name) + ' ' + f.goals.home + '–' + f.goals.away + ' ' + t(f.teams.away.name) + ' (' + f.fixture.status.elapsed + '\')     ';
      });
      scoreA.textContent = txts.join('  |  ');
      scoreB.textContent = txts.join('  |  ');
    })
    .catch(function() {
      liveEl.classList.remove('visible');
      scoreA.textContent = 'Consulta los partidos del día     ';
      scoreB.textContent = 'Consulta los partidos del día     ';
    });
}

// ── INIT ───────────────────────────────────────────────────────
actualizarTicker();
setInterval(function() {
  var hora = new Date().getHours();
  if (hora >= HORA_INICIO && hora < HORA_FIN) actualizarTicker();
}, 60000);

// ── AUTORESIZE: notifica al portal de Pulzo el alto del widget ──
function notificarAlto() {
  var alto = document.body.scrollHeight;
  window.parent.postMessage({ tipo: 'mundialPulzoAlto', alto: alto }, '*');
}

// Observar cambios de tamaño en el contenido
if (window.ResizeObserver) {
  var observer = new ResizeObserver(function() { notificarAlto(); });
  observer.observe(document.body);
} else {
  // Fallback para navegadores sin ResizeObserver
  setInterval(notificarAlto, 300);
}

// Notificar al cargar
window.addEventListener('load', notificarAlto);
</script>
