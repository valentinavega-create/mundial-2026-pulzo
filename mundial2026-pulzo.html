function tiempoRelativo(fecha) {
  var diff = Math.floor((Date.now() - new Date(fecha)) / 60000);
  if (diff < 1)  return 'Ahora mismo';
  if (diff < 60) return 'Hace ' + diff + ' min';
  var h = Math.floor(diff/60);
  if (h < 24)   return 'Hace ' + h + ' hora' + (h>1?'s':'');
  var d = Math.floor(h/24);
  return 'Hace ' + d + ' dia' + (d>1?'s':'');
}

function horaCol(timestamp) {
  var colMs = timestamp * 1000 - (5 * 3600 * 1000);
  var d = new Date(colMs);
  var h = d.getUTCHours(), m = d.getUTCMinutes();
  var ampm = h >= 12 ? 'p.m.' : 'a.m.';
  var h12 = h % 12 || 12;
  return h12 + ':' + (m < 10 ? '0'+m : m) + ' ' + ampm;
}

function fechaCol(timestamp) {
  var dias  = ['Domingo','Lunes','Martes','Miercoles','Jueves','Viernes','Sabado'];
  var meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  var colMs = timestamp * 1000 - (5 * 3600 * 1000);
  var col   = new Date(colMs);
  var hoyMs = Date.now() - (5 * 3600 * 1000);
  var colHoy= new Date(hoyMs);
  var manMs = hoyMs + 86400000;
  var manana= new Date(manMs);
  var esHoy = col.getUTCDate()===colHoy.getUTCDate() && col.getUTCMonth()===colHoy.getUTCMonth();
  var esMar = col.getUTCDate()===manana.getUTCDate() && col.getUTCMonth()===manana.getUTCMonth();
  var label = dias[col.getUTCDay()] + ' ' + col.getUTCDate() + ' ' + meses[col.getUTCMonth()];
  if (esHoy) return 'Hoy - ' + label;
  if (esMar) return 'Manana - ' + label;
  return label;
}

function apiCall(endpoint, params) {
  var p = Object.assign({ league: LEAGUE, season: SEASON }, params);
  var qs = Object.keys(p).map(function(k){ return k+'='+p[k]; }).join('&');
  return fetch(API_BASE + endpoint + '?' + qs, {
    headers: { 'x-apisports-key': API_KEY }
  }).then(function(r){ return r.json(); });
}

function showPanel(name) {
  var panels = ['noticias','partidos','posiciones','predicciones'];
  if (activePanel === name) {
    panels.forEach(function(p){
      document.getElementById('panel-'+p).classList.remove('active');
      document.getElementById('btn-'+p).classList.remove('active');
    });
    activePanel = null;
    notificarAlto();
    return;
  }
  panels.forEach(function(p){
    document.getElementById('panel-'+p).classList.remove('active');
    document.getElementById('btn-'+p).classList.remove('active');
  });
  document.getElementById('panel-'+name).classList.add('active');
  document.getElementById('btn-'+name).classList.add('active');
  activePanel = name;
  if (name === 'noticias')     cargarNoticias();
  if (name === 'partidos')     cargarPartidos();
  if (name === 'posiciones')   cargarPosiciones();
  if (name === 'predicciones') cargarPredicciones();
  setTimeout(notificarAlto, 500);
}

function cargarNoticias() {
  var loading = document.getElementById('n-loading');
  var lista   = document.getElementById('n-lista');
  lista.innerHTML = '';
  loading.style.display = 'block';
  var url = 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(RSS_URL) + '&t=' + Date.now();
  fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(data) {
      loading.style.display = 'none';
      if (!data.items || !data.items.length) {
        lista.innerHTML = '<div class="error-msg"><i class="ti ti-news-off"></i>No hay noticias disponibles.</div>';
        return;
      }
      data.items.slice(0,6).forEach(function(item) {
        var titulo = item.title || '';
        var enlace = item.link  || '#';
        var fecha  = item.pubDate || '';
        var imgUrl = item.thumbnail || (item.enclosure ? item.enclosure.link : '') || '';
        var el = document.createElement('a');
        el.className = 'n-item';
        el.href = enlace;
        el.target = '_blank';
        el.rel = 'noopener';
        var imgDiv = document.createElement('div');
        imgDiv.className = 'n-img';
        if (imgUrl) {
          var img = document.createElement('img');
          img.src = imgUrl; img.alt = titulo; img.loading = 'lazy';
          img.onerror = function(){ this.parentElement.innerHTML='<div class="n-placeholder"><i class="ti ti-photo"></i></div>'; };
          imgDiv.appendChild(img);
        } else {
          imgDiv.innerHTML = '<div class="n-placeholder"><i class="ti ti-photo"></i></div>';
        }
        var body = document.createElement('div');
        body.style.cssText = 'flex:1;min-width:0';
        body.innerHTML = '<div class="n-cat">Futbol</div><div class="n-title">'+titulo+'</div><div class="n-time">'+tiempoRelativo(fecha)+'</div>';
        el.appendChild(imgDiv);
        el.appendChild(body);
        lista.appendChild(el);
      });
      notificarAlto();
    })
    .catch(function(){
      loading.style.display = 'none';
      lista.innerHTML = '<div class="error-msg"><i class="ti ti-wifi-off"></i>No se pudieron cargar las noticias.</div>';
    });
}

function normalizar(s) {
  return (s||'').toLowerCase()
    .replace(/[áà]/g,'a').replace(/[éè]/g,'e').replace(/[íì]/g,'i')
    .replace(/[óò]/g,'o').replace(/[úù]/g,'u').replace(/ñ/g,'n')
    .replace(/[\s\.\-]/g,'');
}

function canalesPorPartido(timestamp, local, visita) {
  var colMs = timestamp * 1000 - (5 * 3600 * 1000);
  var d = new Date(colMs);
  var fecha = d.getUTCFullYear() + '-' +
    String(d.getUTCMonth()+1).padStart(2,'0') + '-' +
    String(d.getUTCDate()).padStart(2,'0');
  var dia = PARRILLA[fecha];
  if (!dia) return ['Dsports'];
  var nL = normalizar(local), nV = normalizar(visita);
  for (var i=0; i<dia.length; i++) {
    var pL = normalizar(dia[i].local), pV = normalizar(dia[i].visita);
    if ((pL===nL && pV===nV)||(pL===nV && pV===nL)) return dia[i].canales;
    if (nL.indexOf(pL)!==-1||pL.indexOf(nL)!==-1||nV.indexOf(pV)!==-1||pV.indexOf(nV)!==-1) return dia[i].canales;
  }
  return ['Dsports'];
}

function cargarPartidos() {
  if (partidosCache) { renderPartidos(partidosCache); return; }
  var loading = document.getElementById('p-loading');
  var lista   = document.getElementById('p-lista');
  loading.style.display = 'block';
  lista.innerHTML = '';
  apiCall('/fixtures', { next: 12 })
    .then(function(data) {
      loading.style.display = 'none';
      if (!data.response || !data.response.length) {
        lista.innerHTML = '<div class="error-msg"><i class="ti ti-calendar-off"></i>No hay partidos programados.</div>';
        return;
      }
      partidosCache = data.response;
      renderPartidos(data.response);
    })
    .catch(function(){
      loading.style.display = 'none';
      lista.innerHTML = '<div class="error-msg"><i class="ti ti-wifi-off"></i>No se pudieron cargar los partidos.</div>';
    });
}

function renderPartidos(fixtures) {
  var lista = document.getElementById('p-lista');
  lista.innerHTML = '';
  var dias = {};
  fixtures.forEach(function(f) {
    var colMs = f.fixture.timestamp * 1000 - (5 * 3600 * 1000);
    var col = new Date(colMs);
    var key = col.getUTCFullYear()+'-'+String(col.getUTCMonth()+1).padStart(2,'0')+'-'+String(col.getUTCDate()).padStart(2,'0');
    if (!dias[key]) dias[key] = [];
    dias[key].push(f);
  });
  var claves = Object.keys(dias).sort().slice(0,3);
  claves.forEach(function(key) {
    var lbl = document.createElement('div');
    lbl.className = 'day-label';
    lbl.textContent = fechaCol(dias[key][0].fixture.timestamp);
    lista.appendChild(lbl);
    dias[key].forEach(function(f) {
      var status = f.fixture.status.short;
      var enVivo = ['1H','2H','ET','HT','P'].indexOf(status) !== -1;
      var terminado = status === 'FT';
      var local  = t(f.teams.home.name);
      var visita = t(f.teams.away.name);
      var canales = canalesPorPartido(f.fixture.timestamp, local, visita);
      var mc = document.createElement('div');
      mc.className = 'mc' + (enVivo ? ' en-vivo' : '');
      var html = '';
      if (enVivo) html += '<div class="badge-vivo"><span></span> En vivo - '+f.fixture.status.elapsed+"'</div>";
      html += '<div class="mt">'+local+' <span class="mvs">vs</span> '+visita+'</div>';
      if (enVivo || terminado) {
        html += '<div class="mm"><span class="marcador">'+f.goals.home+' - '+f.goals.away+'</span>';
        if (terminado) html += '<span style="font-size:12px;color:var(--t3)">Final</span>';
        html += '</div>';
      } else {
        html += '<div class="mm"><span class="mtime"><i class="ti ti-clock"></i> '+horaCol(f.fixture.timestamp)+'</span>';
        canales.forEach(function(c){ html += '<span class="ch">'+c+'</span>'; });
        html += '</div>';
      }
      mc.innerHTML = html;
      lista.appendChild(mc);
    });
  });
  lista.innerHTML += '<p style="font-size:11px;color:var(--t3);margin-top:12px;text-align:center">* Horarios en hora Colombia. Canales referenciales.</p>';
  notificarAlto();
}

function cargarPosiciones() {
  if (posicionesCache) { renderPosiciones(posicionesCache); return; }
  var loading = document.getElementById('pos-loading');
  var lista   = document.getElementById('pos-lista');
  loading.style.display = 'block';
  apiCall('/standings', {})
    .then(function(data) {
      loading.style.display = 'none';
      if (!data.response || !data.response.length) {
        lista.innerHTML = '<div class="error-msg"><i class="ti ti-table-off"></i>Las posiciones estaran disponibles cuando inicie el torneo.</div>';
        return;
      }
      posicionesCache = data.response[0].league.standings;
      renderPosiciones(posicionesCache);
    })
    .catch(function(){
      loading.style.display = 'none';
      lista.innerHTML = '<div class="error-msg"><i class="ti ti-wifi-off"></i>No se pudieron cargar las posiciones.</div>';
    });
}

function renderPosiciones(standings) {
  var lista = document.getElementById('pos-lista');
  lista.innerHTML = '';
  var grid = document.createElement('div');
  grid.className = 'gg';
  var letras = ['A','B','C','D','E','F','G','H','I','J','K','L'];
  standings.forEach(function(grupo, idx) {
    var nombreApi = grupo[0] ? grupo[0].group : '';
    if (nombreApi === 'Group Stage' || nombreApi === 'Group stage') return;
    var nombre = nombreApi.replace('Group','Grupo').trim();
    if (!nombre || nombre === 'Grupo') nombre = 'Grupo ' + (letras[idx] || (idx+1));
    var gc = document.createElement('div');
    gc.className = 'gc';
    gc.innerHTML = '<div class="gh">'+nombre+' <span>PJ G E P Pts</span></div>';
    grupo.forEach(function(eq) {
      var pnClass = eq.rank===1?'pn p1':eq.rank===2?'pn p2':'pn';
      var clasif  = eq.rank<=2 ? '<span class="cbadge">Clasifica</span>' : '';
      var logo    = eq.team.logo ? '<img src="'+eq.team.logo+'" style="width:18px;height:18px;object-fit:contain" alt="">' : '';
      gc.innerHTML += '<div class="gr"><span class="'+pnClass+'">'+eq.rank+'</span><span>'+logo+'</span><span class="tn">'+t(eq.team.name)+'</span>'+clasif+'<span class="st">'+eq.all.played+'</span><span class="st">'+eq.all.win+'</span><span class="st">'+eq.all.draw+'</span><span class="st">'+eq.all.lose+'</span><span class="st pts">'+eq.points+'</span></div>';
    });
    grid.appendChild(gc);
  });
  lista.appendChild(grid);
  lista.innerHTML += '<p style="font-size:11px;color:var(--t3);margin-top:10px">Los dos primeros de cada grupo clasifican. Se actualiza al terminar cada partido.</p>';
  notificarAlto();
}

function cargarPredicciones() {
  if (predCache) { renderPredicciones(predCache); return; }
  var loading = document.getElementById('pred-loading');
  var lista   = document.getElementById('pred-lista');
  loading.style.display = 'block';
  apiCall('/fixtures', { next: 3 })
    .then(function(data) {
      if (!data.response || !data.response.length) {
        loading.style.display = 'none';
        lista.innerHTML = '<div class="error-msg"><i class="ti ti-calendar-off"></i>No hay partidos proximos.</div>';
        return;
      }
      var fixtures = data.response.slice(0,3);
      var promesas = fixtures.map(function(f) {
        return apiCall('/predictions', { fixture: f.fixture.id })
          .then(function(p){ return { fixture: f, pred: p.response && p.response[0] ? p.response[0] : null }; })
          .catch(function(){ return { fixture: f, pred: null }; });
      });
      return Promise.all(promesas);
    })
    .then(function(res) {
      loading.style.display = 'none';
      if (!res || !res.length) return;
      predCache = res;
      renderPredicciones(res);
    })
    .catch(function(){
      loading.style.display = 'none';
      lista.innerHTML = '<div class="error-msg"><i class="ti ti-wifi-off"></i>No se pudieron cargar las predicciones.</div>';
    });
}

function renderPredicciones(resultados) {
  var lista = document.getElementById('pred-lista');
  lista.innerHTML = '';
  var t1 = document.createElement('div');
  t1.className = 'stitle';
  t1.textContent = 'Como vemos los proximos partidos';
  lista.appendChild(t1);
  resultados.forEach(function(r) {
    if (!r) return;
    var local  = t(r.fixture.teams.home.name);
    var visita = t(r.fixture.teams.away.name);
    var pred   = r.pred;
    var winnerNombre, pLocal, pEmpate, pVisita;
    if (pred && pred.predictions && pred.predictions.percent) {
      var w = pred.predictions.winner;
      var pct = pred.predictions.percent;
      winnerNombre = w ? t(w.name) : null;
      pLocal  = parseInt(pct.home) || 45;
      pEmpate = parseInt(pct.draw) || 25;
      pVisita = parseInt(pct.away) || 30;
    } else {
      winnerNombre = null; pLocal=45; pEmpate=25; pVisita=30;
    }
    var pc = document.createElement('div');
    pc.className = 'pc';
    var winHtml = winnerNombre
      ? '<div class="winner-tag"><i class="ti ti-trophy" style="font-size:14px"></i> Favorito: '+winnerNombre+' gana</div>'
      : '<div class="winner-tag"><i class="ti ti-minus" style="font-size:14px"></i> Partido muy parejo</div>';
    pc.innerHTML = '<div class="pm"><div class="pteam">'+local+'</div><div class="pvs">vs</div><div class="pteam">'+visita+'</div></div>'+winHtml+'<div class="pb"><div class="pr"><span class="prl">'+local+'</span><div class="pt2"><div class="pf" style="width:'+pLocal+'%"></div></div><span class="pp">'+pLocal+'%</span></div><div class="pr"><span class="prl">Empate</span><div class="pt2"><div class="pf draw" style="width:'+pEmpate+'%"></div></div><span class="pp">'+pEmpate+'%</span></div><div class="pr"><span class="prl">'+visita+'</span><div class="pt2"><div class="pf away" style="width:'+pVisita+'%"></div></div><span class="pp">'+pVisita+'%</span></div></div>';
    lista.appendChild(pc);
  });
  var nota = document.createElement('p');
  nota.className = 'pred-nota';
  nota.textContent = '* Predicciones basadas en modelos estadisticos de API-Football.';
  lista.appendChild(nota);
  notificarAlto();
}

function actualizarTicker() {
  var hora = new Date().getHours();
  var liveEl = document.getElementById('r1-live');
  var scoreA = document.getElementById('score-a');
  var scoreB = document.getElementById('score-b');
  var ticker = document.getElementById('r1-ticker-inner');
  if (hora < HORA_INICIO || hora >= HORA_FIN) {
    liveEl.classList.remove('visible');
    ticker.classList.remove('quieto');
    scoreA.textContent = 'Consulta los partidos del dia     ';
    scoreB.textContent = 'Consulta los partidos del dia     ';
    return;
  }
  apiCall('/fixtures', { live: 'all' })
    .then(function(data) {
      var vivos = data.response || [];
      if (!vivos.length) {
        liveEl.classList.remove('visible');
        ticker.classList.remove('quieto');
        return apiCall('/fixtures', { next: 2 }).then(function(d) {
          var px = d.response || [];
          var txt = '';
          if (px.length >= 2) {
            txt = t(px[0].teams.home.name)+' vs '+t(px[0].teams.away.name)+'  -  '+horaCol(px[0].fixture.timestamp)+'     |     '+t(px[1].teams.home.name)+' vs '+t(px[1].teams.away.name)+'  -  '+horaCol(px[1].fixture.timestamp)+'     ';
          } else if (px.length === 1) {
            txt = 'Proximo: '+t(px[0].teams.home.name)+' vs '+t(px[0].teams.away.name)+'  -  '+horaCol(px[0].fixture.timestamp)+'     ';
          } else {
            txt = 'Consulta los partidos del dia     ';
          }
          scoreA.textContent = txt;
          scoreB.textContent = txt;
        });
      }
      liveEl.classList.add('visible');
      ticker.classList.add('quieto');
      var f1 = vivos[0];
      var minuto = f1.fixture.status.elapsed;
      var txtVivo = t(f1.teams.home.name)+' '+f1.goals.home+'-'+f1.goals.away+' '+t(f1.teams.away.name)+' ('+minuto+"')";
      return apiCall('/fixtures', { next: 1 }).then(function(d) {
        var prox = d.response && d.response[0];
        var txtFinal = txtVivo;
        if (prox) {
          txtFinal += '     |     Proximo: '+t(prox.teams.home.name)+' vs '+t(prox.teams.away.name)+'  -  '+horaCol(prox.fixture.timestamp);
        }
        scoreA.textContent = txtFinal;
        scoreB.textContent = '';
      }).catch(function() {
        scoreA.textContent = txtVivo;
        scoreB.textContent = '';
      });
    })
    .catch(function() {
      liveEl.classList.remove('visible');
      ticker.classList.remove('quieto');
      scoreA.textContent = 'Consulta los partidos del dia     ';
      scoreB.textContent = 'Consulta los partidos del dia     ';
    });
}

function notificarAlto() {
  var alto = document.body.scrollHeight;
  window.parent.postMessage({ tipo: 'mundialPulzoAlto', alto: alto }, '*');
}

actualizarTicker();
setInterval(function() {
  var hora = new Date().getHours();
  if (hora >= HORA_INICIO && hora < HORA_FIN) actualizarTicker();
}, 60000);

if (window.ResizeObserver) {
  var observer = new ResizeObserver(function() { notificarAlto(); });
  observer.observe(document.body);
} else {
  setInterval(notificarAlto, 500);
}
window.addEventListener('load', notificarAlto);
