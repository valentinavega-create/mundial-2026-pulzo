.live-dot{width:8px;height:8px;background:#22c55e;border-radius:50%;animation:blink 1.2s infinite;box-shadow:0 0 6px rgba(34,197,94,.5);}

.live-label{font-size:12px;font-weight:700;color:var(--t2);white-space:nowrap;}
.ticker-wrap{flex:1;overflow:hidden;min-width:0;}
.ticker-inner{display:inline-flex;align-items:center;white-space:nowrap;animation:tmove 20s linear infinite;}
.ticker-inner.still{animation:none;}
@keyframes tmove{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.tscore{font-size:13px;font-weight:700;color:var(--t1);padding-right:40px;}
.row2{background:var(--bg1);padding:10px 12px;display:flex;gap:8px;}
.rbtn{display:flex;align-items:center;justify-content:center;gap:7px;padding:9px 0;flex:1;border:1.5px solid var(--bdr2);border-radius:10px;background:var(--bg1);color:var(--t2);font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s;font-family:'Nunito Sans',sans-serif;}
.rbtn i{font-size:15px;color:var(--p);}

.rbtn.on{background:var(--p);color:#fff;border-color:var(--p);}
.rbtn.on i{color:#fff;}
.panel{padding:16px;background:var(--bg1);border-top:1.5px solid var(--bdr1);display:none;}
.panel.on{display:block;}
.spin{text-align:center;padding:24px;color:var(--t3);font-size:13px;}
.spin i{font-size:24px;color:var(--p);display:block;margin:0 auto 8px;animation:rot 1s linear infinite;}
@keyframes rot{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.err{text-align:center;padding:16px;color:var(--t3);font-size:13px;background:var(--bg2);border-radius:8px;}
.ni{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--bdr1);text-decoration:none;}
.ni:last-child{border-bottom:none;}
.ni:hover .nt{color:var(--p);}
.nimg{width:80px;height:58px;border-radius:8px;background:var(--bg3);flex-shrink:0;overflow:hidden;border:1px solid var(--bdr1);}

function timeago(d) {
  var m = Math.floor((Date.now()-new Date(d))/60000);
  if (m<1) return 'Ahora';
  if (m<60) return 'Hace '+m+' min';
  var h = Math.floor(m/60);
  if (h<24) return 'Hace '+h+' hora'+(h>1?'s':'');
  return 'Hace '+Math.floor(h/24)+' dias';
}

function hcol(ts) {
  var d = new Date(ts*1000 - 18000000);
  var h = d.getUTCHours(), m = d.getUTCMinutes();
  var ap = h>=12?'p.m.':'a.m.';
  var h2 = h%12||12;
  return h2+':'+(m<10?'0'+m:m)+' '+ap;
}

function dcol(ts) {
  var D = ['Domingo','Lunes','Martes','Miercoles','Jueves','Viernes','Sabado'];
  var M = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  var d = new Date(ts*1000 - 18000000);
  var n = new Date(Date.now()-18000000);
  var t = new Date(Date.now()-18000000+86400000);
  var hoy = d.getUTCDate()===n.getUTCDate()&&d.getUTCMonth()===n.getUTCMonth();
  var man = d.getUTCDate()===t.getUTCDate()&&d.getUTCMonth()===t.getUTCMonth();
  var lb = D[d.getUTCDay()]+' '+d.getUTCDate()+' '+M[d.getUTCMonth()];
  if (hoy) return 'Hoy - '+lb;
  if (man) return 'Manana - '+lb;
  return lb;
}

function norm(s) {
  if (!s) return '';
  var r = s.toLowerCase();
  var ac = String.fromCharCode;
  var map = [[ac(225),ac(224),'a'],[ac(233),ac(232),'e'],[ac(237),ac(236),'i'],[ac(243),ac(242),'o'],[ac(250),ac(249),'u'],[ac(241),'','n']];
  map.forEach(function(x){ r=r.split(x[0]).join(x[2]); if(x[1]) r=r.split(x[1]).join(x[2]); });
  return r.split(' ').join('').split('.').join('').split('-').join('');
}

function get_channels(ts, lo, vi) {
  var d = new Date(ts*1000-18000000);
  var k = d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0');
  var day = PAR[k];
  if (!day) return ['Dsports'];
  var nl=norm(lo), nv=norm(vi);
  console.log('Buscando canales fecha:'+k+' local:'+lo+'('+nl+') visita:'+vi+'('+nv+')');
  // Primero buscar coincidencia exacta de los dos equipos
  for (var i=0;i<day.length;i++) {
    var pl=norm(day[i].l), pv=norm(day[i].v);
    if ((pl===nl&&pv===nv)||(pl===nv&&pv===nl)) {
      console.log('Exacto encontrado:'+day[i].l+' vs '+day[i].v);
      return day[i].c;
    }
  }
  // Si no hay exacta, buscar por un solo equipo
  for (var i=0;i<day.length;i++) {
    var pl=norm(day[i].l), pv=norm(day[i].v);
    if (pl===nl||pv===nv||pl===nv||pv===nl) {
      console.log('Parcial encontrado:'+day[i].l+' vs '+day[i].v);
      return day[i].c;
    }
  }
  console.log('No encontrado, devolviendo Dsports');
  return ['Dsports'];
}


function load_fixtures() {
  if (pcache){render_fixtures(pcache);return;}
  var el=document.getElementById('pload'), li=document.getElementById('plist');
  el.style.display='block'; li.innerHTML='';
  Promise.all([api('/fixtures',{live:'all'}), api('/fixtures',{next:12})])
    .then(function(res){
      el.style.display='none';
      var vivos=res[0].response||[], prox=res[1].response||[];
      var vids=vivos.map(function(f){return f.fixture.id;});
      var todos=vivos.concat(prox.filter(function(f){return vids.indexOf(f.fixture.id)===-1;}));
      if(!todos.length){render_fixtures_fallback();return;}
      pcache=todos; render_fixtures(todos);
    })
    .catch(function(){el.style.display='none';render_fixtures_fallback();});
}

function render_fixtures_fallback() {
  var li=document.getElementById('plist'); li.innerHTML='';
  var hoy = new Date(Date.now()-18000000);
  var D=['Domingo','Lunes','Martes','Miercoles','Jueves','Viernes','Sabado'];
  var M=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  var k=hoy.getUTCFullYear()+'-'+String(hoy.getUTCMonth()+1).padStart(2,'0')+'-'+String(hoy.getUTCDate()).padStart(2,'0');
  var day=PAR[k];
  if(!day){li.innerHTML='<div class="err">No hay partidos programados para hoy.</div>';return;}
  var lb=document.createElement('div'); lb.className='dlabel';
  lb.textContent='Hoy - '+D[hoy.getUTCDay()]+' '+hoy.getUTCDate()+' '+M[hoy.getUTCMonth()];
  li.appendChild(lb);
  day.forEach(function(p){
    var mc=document.createElement('div'); mc.className='mc';
    mc.innerHTML='<div class="mteams">'+p.l+' <span class="mvs">vs</span> '+p.v+'</div><div class="mmeta"><span class="mhora"><i class="ti ti-clock"></i> '+p.h+'</span>'+p.c.map(function(c){return '<span class="ch">'+c+'</span>';}).join('')+'</div>';
    li.appendChild(mc);
  });
  li.innerHTML+='<p style="font-size:11px;color:var(--t3);margin-top:12px;text-align:center">* Horarios hora Colombia. Canales referenciales.</p>';
  notify();
}

function render_fixtures(list) {
  var li=document.getElementById('plist'); li.innerHTML='';
  var days={};
  list.forEach(function(f){
    var d=new Date(f.fixture.timestamp*1000-18000000);
    var k=d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0');
    if(!days[k])days[k]=[];
    days[k].push(f);
  });
  Object.keys(days).sort().slice(0,3).forEach(function(k){
    var lb=document.createElement('div'); lb.className='dlabel';
    lb.textContent=dcol(days[k][0].fixture.timestamp);
    li.appendChild(lb);
    days[k].forEach(function(f){
      var st=f.fixture.status.short;
      var live=['1H','2H','ET','HT','P'].indexOf(st)!==-1;
      var done=st==='FT';
      var lo=tn(f.teams.home.name), vi=tn(f.teams.away.name);
      var ch=get_channels(f.fixture.timestamp,lo,vi);
      var mc=document.createElement('div'); mc.className='mc'+(live?' vivo':'');
      var h='';
      if(live) h+='<div class="vbadge"><span></span> En vivo - '+f.fixture.status.elapsed+"'</div>";
      h+='<div class="mteams">'+lo+' <span class="mvs">vs</span> '+vi+'</div>';
      if(live||done){
        h+='<div class="mmeta"><span class="mscore">'+f.goals.home+' - '+f.goals.away+'</span>';
        if(done) h+='<span style="font-size:11px;font-weight:700;color:var(--t3);background:var(--bg3);padding:2px 8px;border-radius:4px">Finalizado</span>';
        // Mostrar canales también en vivo y final
        ch.forEach(function(c){h+='<span class="ch">'+c+'</span>';});
        h+='</div>';
      } else {
        h+='<div class="mmeta"><span class="mhora"><i class="ti ti-clock"></i> '+hcol(f.fixture.timestamp)+'</span>';
        ch.forEach(function(c){h+='<span class="ch">'+c+'</span>';});
        h+='</div>';
      }
      mc.innerHTML=h; li.appendChild(mc);
    });
  });
  li.innerHTML+='<p style="font-size:11px;color:var(--t3);margin-top:12px;text-align:center">* Horarios hora Colombia. Canales referenciales.</p>';
  notify();
}

function load_standings() {
  if(scache){render_standings(scache);return;}
  var el=document.getElementById('sload'), li=document.getElementById('slist');
  el.style.display='block';
  api('/standings',{})
    .then(function(data){
      el.style.display='none';
      if(!data.response||!data.response.length){li.innerHTML='<div class="err">Posiciones disponibles al iniciar el torneo.</div>';return;}
      scache=data.response[0].league.standings;
      render_standings(scache);
    })
    .catch(function(){el.style.display='none';li.innerHTML='<div class="err">Error cargando posiciones.</div>';});
}

function render_standings(st) {
  var li=document.getElementById('slist'); li.innerHTML='';
  var grid=document.createElement('div'); grid.className='gg';
  var lets=['A','B','C','D','E','F','G','H','I','J','K','L'];
  st.forEach(function(g,idx){
    var na=g[0]?g[0].group:'';
    if(na==='Group Stage'||na==='Group stage') return;
    var nm=na.replace('Group','Grupo').trim();
    if(!nm||nm==='Grupo') nm='Grupo '+(lets[idx]||(idx+1));
    var gc=document.createElement('div'); gc.className='gc';
    gc.innerHTML='<div class="gh">'+nm+' <span>PJ G E P Pts</span></div>';
    g.forEach(function(eq){
      var pc=eq.rank===1?'pos pos1':eq.rank===2?'pos pos2':'pos';
      var cb=eq.rank<=2?'<span class="cbadge">Clasifica</span>':'';
      var lg=eq.team.logo?'<img src="'+eq.team.logo+'" style="width:18px;height:18px;object-fit:contain" alt="">':'';
      gc.innerHTML+='<div class="gr"><span class="'+pc+'">'+eq.rank+'</span><span>'+lg+'</span><span class="tname">'+tn(eq.team.name)+'</span>'+cb+'<span class="st">'+eq.all.played+'</span><span class="st">'+eq.all.win+'</span><span class="st">'+eq.all.draw+'</span><span class="st">'+eq.all.lose+'</span><span class="st pts">'+eq.points+'</span></div>';
    });
    grid.appendChild(gc);
  });
  li.appendChild(grid);
  li.innerHTML+='<p style="font-size:11px;color:var(--t3);margin-top:10px">Los dos primeros de cada grupo clasifican.</p>';
  notify();
}

function load_predictions() {
  if(dcache){render_predictions(dcache);return;}
  var el=document.getElementById('dload'), li=document.getElementById('dlist');
  el.style.display='block';
  api('/fixtures',{next:3})
    .then(function(data){
      if(!data.response||!data.response.length){el.style.display='none';li.innerHTML='<div class="err">No hay partidos proximos.</div>';return;}
      var fx=data.response.slice(0,3);
      return Promise.all(fx.map(function(f){
        return api('/predictions',{fixture:f.fixture.id})
          .then(function(p){return{fixture:f,pred:p.response&&p.response[0]?p.response[0]:null};})
          .catch(function(){return{fixture:f,pred:null};});
      }));
    })
    .then(function(res){
      el.style.display='none';
      if(!res||!res.length) return;
      dcache=res; render_predictions(res);
    })
    .catch(function(){el.style.display='none';li.innerHTML='<div class="err">Error cargando predicciones.</div>';});
}

function render_predictions(list) {
  var li=document.getElementById('dlist'); li.innerHTML='';
  var t=document.createElement('div'); t.className='ptitle'; t.textContent='Como vemos los proximos partidos'; li.appendChild(t);
  list.forEach(function(r){
    if(!r) return;
    var lo=tn(r.fixture.teams.home.name), vi=tn(r.fixture.teams.away.name);
    var wn=null, pl=45, pe=25, pv=30;
    if(r.pred&&r.pred.predictions&&r.pred.predictions.percent){
      var w=r.pred.predictions.winner, pct=r.pred.predictions.percent;
      if(w) wn=tn(w.name);
      pl=parseInt(pct.home)||45; pe=parseInt(pct.draw)||25; pv=parseInt(pct.away)||30;
    }
    var pc=document.createElement('div'); pc.className='pcard';
    var fav=wn?'<div class="pfav"><i class="ti ti-trophy" style="font-size:14px"></i> Favorito: '+wn+' gana</div>':'<div class="pfav"><i class="ti ti-minus" style="font-size:14px"></i> Partido muy parejo</div>';
    pc.innerHTML='<div class="pteams"><div class="pteam">'+lo+'</div><div class="pvs">vs</div><div class="pteam">'+vi+'</div></div>'+fav+'<div class="pbars"><div class="prow"><span class="plabel">'+lo+'</span><div class="ptrack"><div class="pfill" style="width:'+pl+'%"></div></div><span class="ppct">'+pl+'%</span></div><div class="prow"><span class="plabel">Empate</span><div class="ptrack"><div class="pfill d" style="width:'+pe+'%"></div></div><span class="ppct">'+pe+'%</span></div><div class="prow"><span class="plabel">'+vi+'</span><div class="ptrack"><div class="pfill a" style="width:'+pv+'%"></div></div><span class="ppct">'+pv+'%</span></div></div>';
    li.appendChild(pc);
  });
  var n=document.createElement('p'); n.className='pnota'; n.textContent='* Predicciones basadas en modelos estadisticos de API-Football.'; li.appendChild(n);
  notify();
}

function tick() {
  var h=new Date().getHours();
  var lb=document.getElementById('livebadge');
  var sa=document.getElementById('sa'), sb=document.getElementById('sb');
  var tk=document.getElementById('ticker');
  if(h<H0||h>=H1){
    lb.classList.remove('on'); tk.classList.remove('still');
    sa.textContent='Consulta los partidos del dia     '; sb.textContent='Consulta los partidos del dia     '; return;
  }
  api('/fixtures',{live:'all'})
    .then(function(data){
      var vivos=data.response||[];
      if(!vivos.length){
        lb.classList.remove('on'); tk.classList.remove('still');
        return api('/fixtures',{next:2}).then(function(d){
          var px=d.response||[], txt='';
          if(px.length>=2) txt=tn(px[0].teams.home.name)+' vs '+tn(px[0].teams.away.name)+'  -  '+hcol(px[0].fixture.timestamp)+'     |     '+tn(px[1].teams.home.name)+' vs '+tn(px[1].teams.away.name)+'  -  '+hcol(px[1].fixture.timestamp)+'     ';
          else if(px.length===1) txt='Proximo: '+tn(px[0].teams.home.name)+' vs '+tn(px[0].teams.away.name)+'  -  '+hcol(px[0].fixture.timestamp)+'     ';
          else txt='Consulta los partidos del dia     ';
          sa.textContent=txt; sb.textContent=txt;
        });
      }
      lb.classList.add('on'); tk.classList.add('still');
      var f1=vivos[0];
      var tv=tn(f1.teams.home.name)+' '+f1.goals.home+'-'+f1.goals.away+' '+tn(f1.teams.away.name)+" ("+f1.fixture.status.elapsed+"')";
      return api('/fixtures',{next:1}).then(function(d){
        var px=d.response&&d.response[0];
        sa.textContent=tv+(px?'     |     Proximo: '+tn(px.teams.home.name)+' vs '+tn(px.teams.away.name)+'  -  '+hcol(px.fixture.timestamp):'');
        sb.textContent='';
      }).catch(function(){sa.textContent=tv;sb.textContent='';});
    })
    .catch(function(){
      lb.classList.remove('on');tk.classList.remove('still');
      var hoy=new Date(Date.now()-18000000);
      var k=hoy.getUTCFullYear()+'-'+String(hoy.getUTCMonth()+1).padStart(2,'0')+'-'+String(hoy.getUTCDate()).padStart(2,'0');
      var day=PAR[k];
      if(day&&day.length>=2){
        sa.textContent=day[0].l+' vs '+day[0].v+'  -  '+day[0].h+'     |     '+day[1].l+' vs '+day[1].v+'  -  '+day[1].h+'     ';
        sb.textContent=day[0].l+' vs '+day[0].v+'  -  '+day[0].h+'     |     '+day[1].l+' vs '+day[1].v+'  -  '+day[1].h+'     ';
      } else if(day&&day.length===1){
        sa.textContent=day[0].l+' vs '+day[0].v+'  -  '+day[0].h+'     ';
        sb.textContent=day[0].l+' vs '+day[0].v+'  -  '+day[0].h+'     ';
      } else {
        sa.textContent='Consulta los partidos del dia     ';
        sb.textContent='Consulta los partidos del dia     ';
      }
    });
}

tick();
setInterval(function(){if(new Date().getHours()>=H0&&new Date().getHours()<H1)tick();},60000);
if(window.ResizeObserver){new ResizeObserver(function(){notify();}).observe(document.body);}
else{setInterval(notify,500);}
window.addEventListener('load',notify);
</script>
